<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Flex Box</title>
</head>
<body>
    <!-- 1 - flex -->
     <div class="flex">
        <p>Meu</p>
        <p>Primeiro</p>
        <p>elemento</p>
        <p>com flex</p>
     </div>
     <!-- 2 - Column -->
     <div class="flex_column">
        <span>1</span>
        <span>2</span>
        <span>3</span>
        <p>4</p>
     </div>
     <!-- 3 - Wrap -->
      <div class="wrap">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
      </div>

      <!-- 4 - justify Content -->
       <h2>Center</h2>
       <div class="center">
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
       </div>
       <h2>Space Around</h2>
       <div class="space_around">
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
       </div>
       <h2>Space Between</h2>
       <div class="space_between">
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
       </div>
       <h2>End</h2>
       <div class="end">
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
       </div>

      <!-- 5 - Align Items -->
       <h2>Center</h2>
       <div class="align_center">
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
       </div>
       <h2>Space Around</h2>
       <div class="flex_end">
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
       </div>
       <h2>Stretch</h2>
       <div class="stretch">
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
       </div>

      <!-- 6 - Gap -->
      <div class="gap">
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
         <div class="box"></div>
      </div> 

      <!-- 7 - Order -->
       <h2>Order</h2>
       <div class="order">
         <div class="box" id="three">3</div>
         <div class="box" id="one">1</div>
         <div class="box" id="two">2</div>
       </div>
</body>
</html>
